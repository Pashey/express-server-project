<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finland Quiz App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      background: white;
      border-radius: 16px;
      padding: 20px 30px;
      margin-bottom: 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    h1 {
      color: #333;
      font-size: 1.8rem;
    }

    /* Auth Forms */
    .auth-section {
      display: flex;
      gap: 10px;
    }

    .auth-form {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      max-width: 400px;
      margin: 0 auto 20px;
    }

    .auth-form input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 10px;
    }

    .auth-toggle a {
      color: #667eea;
      cursor: pointer;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user-name {
      font-weight: bold;
      color: #667eea;
    }

    /* Buttons */
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #e53e3e;
      color: white;
    }

    .btn-danger:hover {
      background: #c53030;
    }

    .btn-secondary {
      background: #48bb78;
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #667eea;
      color: #667eea;
    }

    .btn-outline:hover {
      background: #667eea;
      color: white;
    }

    /* Cards */
    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .quiz-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .quiz-card:hover {
      transform: translateY(-5px);
    }

    .quiz-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .quiz-question {
      font-size: 1.2rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .quiz-answer {
      color: #666;
      margin-bottom: 15px;
      padding: 10px;
      background: #f7f7f7;
      border-radius: 8px;
      display: none;
    }

    .quiz-answer.show {
      display: block;
    }

    .quiz-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      font-size: 0.85rem;
      color: #888;
    }

    .quiz-keywords {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 10px;
    }

    .keyword-tag {
      background: #edf2f7;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #4a5568;
    }

    .like-button {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #e53e3e;
    }

    .like-button:hover {
      transform: scale(1.1);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-content h2 {
      margin-bottom: 20px;
    }

    .modal-content input,
    .modal-content textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    .modal-content textarea {
      min-height: 100px;
      resize: vertical;
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 30px;
    }

    .pagination button {
      padding: 8px 16px;
      background: white;
      border: 1px solid #ddd;
    }

    .pagination button.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Search */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-bar input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: white;
    }

    /* Messages */
    .message {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .message.success {
      background: #48bb78;
    }

    .message.error {
      background: #e53e3e;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .hidden {
      display: none;
    }

    /* Form container */
    .form-container {
      max-width: 400px;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>🇫🇮 Finland Quiz App</h1>
      <div id="auth-section"></div>
    </div>

    <!-- Main Content (visible when logged in) -->
    <div id="main-content" class="hidden">
      <!-- Search Bar -->
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search by keyword (e.g., finland, nature, history)..." />
        <button id="search-btn" class="btn-primary">Search</button>
        <button id="clear-search" class="btn-outline">Clear</button>
        <button id="create-post-btn" class="btn-secondary">+ New Question</button>
      </div>

      <!-- Quiz Grid -->
      <div id="quiz-container">
        <div class="loading">Loading questions...</div>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="pagination"></div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal">
    <div class="modal-content">
      <h2 id="auth-modal-title">Login</h2>
      <input type="text" id="auth-email" placeholder="Email" />
      <input type="password" id="auth-password" placeholder="Password" />
      <input type="text" id="auth-name" placeholder="Name (for registration)" class="hidden" />
      <div class="modal-buttons">
        <button id="auth-cancel" class="btn-outline">Cancel</button>
        <button id="auth-submit" class="btn-primary">Submit</button>
      </div>
      <div class="auth-toggle">
        <a id="auth-toggle-link">Need an account? Register</a>
      </div>
    </div>
  </div>

  <!-- Post Modal (Create/Edit) -->
  <div id="post-modal" class="modal">
    <div class="modal-content">
      <h2 id="post-modal-title">Create New Question</h2>
      <input type="text" id="post-question" placeholder="Question" />
      <textarea id="post-answer" placeholder="Answer"></textarea>
      <input type="text" id="post-keywords" placeholder="Keywords (comma separated)" />
      <input type="file" id="post-image" accept="image/*" />
      <div class="modal-buttons">
        <button id="post-cancel" class="btn-outline">Cancel</button>
        <button id="post-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
